<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天涯明月刀 · 籽岷控制台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="host-page">
    <div class="host-shell">
      <header class="host-header">
        <div class="host-brand">
          <img class="brand-logo" src="/zimin-team-logo.svg" alt="籽岷团队 logo" />
          <div>
            <p class="host-eyebrow">Zi Min Custom Console</p>
            <h1>籽岷对话窗口</h1>
            <p class="host-subtitle">籽岷只需要下达任务、观察籽小刀回复，并通过主按钮控制整套本地程序的启停。</p>
          </div>
        </div>
        <a class="debug-link" href="/debug">打开调试页</a>
      </header>

      <section class="run-panel">
        <div class="run-status">
          <p class="run-label">系统状态</p>
          <p id="runStatusText" class="run-value">待机</p>
          <p id="runStatusHint" class="run-hint">当前还没有开始执行任务。</p>
        </div>
        <button id="runToggleButton" class="run-toggle" type="button">开始执行任务</button>
      </section>

      <main class="chat-panel">
        <section id="messageList" class="chat-list" aria-live="polite"></section>

        <form id="composerForm" class="chat-composer">
          <div class="composer-tools">
            <div class="tool-row">
              <button id="voiceStartButton" type="button">开始语音</button>
              <button id="voiceStopButton" type="button" disabled>停止语音</button>
              <p id="voiceStatus" class="tool-status">语音输入未启动。</p>
            </div>
          </div>

          <label class="chat-field">
            <textarea
              id="instructionInput"
              name="instruction"
              rows="4"
              placeholder="例如：先观察一下附近，再决定下一步。"
            ></textarea>
          </label>

          <div class="chat-actions">
            <button type="submit" class="primary">发送任务</button>
          </div>
        </form>
      </main>
    </div>

    <template id="userMessageTemplate">
      <article class="chat-message chat-message-user">
        <div class="chat-role">籽岷</div>
        <p class="chat-text"></p>
      </article>
    </template>

    <template id="assistantMessageTemplate">
      <article class="chat-message chat-message-assistant">
        <div class="chat-role">籽小刀</div>
        <p class="chat-text"></p>
        <p class="chat-meta"></p>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
