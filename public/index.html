<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵枢绘世 · AI 对话框</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="chat-shell">
      <header class="chat-header">
        <div>
          <p class="eyebrow">macOS Verification Chat</p>
          <h1>灵枢绘世 AI 对话框</h1>
          <p class="subtitle">籽岷只管输入文字或语音。当前 macOS 版本先验证对话体验、思考链和动作规划，截图识别暂不接入主对话链路。</p>
        </div>
        <span class="header-pill">当前模式：纯对话规划</span>
      </header>

      <main class="chat-stage">
        <section id="messageList" class="message-list" aria-live="polite"></section>

        <form id="composerForm" class="composer">
          <div class="voice-row">
            <button id="voiceStartButton" type="button">开始语音</button>
            <button id="voiceStopButton" type="button" disabled>停止语音</button>
            <p id="voiceStatus" class="voice-status">语音输入未启动。当前为浏览器 demo，依赖本机麦克风权限。</p>
          </div>

          <label class="composer-field">
            <textarea
              id="instructionInput"
              name="instruction"
              rows="3"
              placeholder="例如：帮我和这个 NPC 混熟，但别太老实。"
            ></textarea>
          </label>

          <div class="composer-actions">
            <button type="submit" class="primary">发送</button>
          </div>
        </form>
      </main>
    </div>

    <template id="userMessageTemplate">
      <article class="message message-user">
        <div class="message-role">籽岷</div>
        <p class="message-text"></p>
      </article>
    </template>

    <template id="assistantMessageTemplate">
      <article class="message message-assistant">
        <div class="message-role">AI 助手</div>
        <p class="message-text"></p>
        <p class="message-meta"></p>
        <p class="message-perception"></p>
        <section class="message-block" data-block="thinking">
          <h2>思考链条</h2>
          <ol class="thinking-list"></ol>
        </section>
        <section class="message-block" data-block="actions">
          <h2>下一步动作</h2>
          <div class="action-list"></div>
        </section>
      </article>
    </template>

    <template id="actionTemplate">
      <div class="action-item">
        <span class="action-title"></span>
        <span class="action-detail"></span>
      </div>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
