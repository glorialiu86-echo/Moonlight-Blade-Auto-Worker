<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>籽小刀</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="simple-chat-page">
    <main class="simple-chat-shell">
      <header class="simple-page-logo-wrap">
        <img class="simple-page-logo" src="/logo.png" alt="籽岷团队" />
      </header>

      <section class="simple-chat-card" aria-label="聊天窗口">
        <section id="messageList" class="simple-message-list" aria-live="polite"></section>
      </section>

      <form id="composerForm" class="simple-composer">
        <label class="simple-composer-field" for="instructionInput">
          <textarea
            id="instructionInput"
            name="instruction"
            rows="3"
            placeholder="说点什么"
          ></textarea>
        </label>
        <div class="simple-composer-actions">
          <button id="resumeFailedStepButton" type="button" class="resume-triangle" aria-label="从失败步骤继续">▶</button>
          <button id="voiceButton" type="button">语音</button>
          <button type="submit" class="primary">发送</button>
        </div>
      </form>
    </main>

    <template id="userMessageTemplate">
      <article class="chat-message chat-message-user">
        <div class="chat-role">籽岷</div>
        <p class="chat-text"></p>
      </article>
    </template>

    <template id="assistantMessageTemplate">
      <article class="chat-message chat-message-assistant">
        <div class="chat-role">籽小刀</div>
        <p class="chat-text"></p>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
